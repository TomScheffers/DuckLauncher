{{- if .Values.coordinator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ducklauncher.coordinator.serviceName" . }}
  labels:
    {{- include "ducklauncher.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
spec:
  replicas: {{ .Values.coordinator.replicas }}
  selector:
    matchLabels:
      {{- include "ducklauncher.coordinator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ducklauncher.coordinator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ducklauncher.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coordinator
          image: {{ include "ducklauncher.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["ducklauncher", "coordinator"]
          args:
            - --port={{ .Values.coordinator.port }}
            - --heartbeat-interval-sec={{ .Values.coordinator.heartbeatIntervalSec }}
            - --worker-stale-sec={{ .Values.coordinator.workerStaleSec }}
            - --scheduler-interval-sec={{ .Values.coordinator.schedulerIntervalSec }}
            {{- if .Values.coordinator.initScripts }}
            - --init-scripts=/config/init.sql
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.coordinator.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ducklauncher.database.secretName" . }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- if .Values.coordinator.publicBaseUrl }}
            - name: PUBLIC_BASE_URL
              value: {{ .Values.coordinator.publicBaseUrl | quote }}
            {{- end }}
            {{- if .Values.coordinator.oidc.issuerUrl }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.coordinator.oidc.issuerUrl | quote }}
            {{- end }}
            {{- if .Values.coordinator.oidc.clientId }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.coordinator.oidc.clientId | quote }}
            {{- end }}
            {{- if .Values.coordinator.oidc.redirectUri }}
            - name: OIDC_REDIRECT_URI
              value: {{ .Values.coordinator.oidc.redirectUri | quote }}
            {{- end }}
            {{- if .Values.coordinator.oidc.existingSecret }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.coordinator.oidc.existingSecret }}
                  key: {{ .Values.coordinator.oidc.existingClientSecretKey }}
            {{- end }}
            {{- if .Values.coordinator.session.existingSecret }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.coordinator.session.existingSecret }}
                  key: {{ .Values.coordinator.session.existingSecretKey }}
            {{- end }}
            {{- if .Values.coordinator.session.ttlHours }}
            - name: SESSION_TTL_HOURS
              value: {{ .Values.coordinator.session.ttlHours | quote }}
            {{- end }}
          {{- if .Values.coordinator.initScripts }}
          volumeMounts:
            - name: init-scripts
              mountPath: /config
              readOnly: true
          {{- end }}
          {{- with .Values.coordinator.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.coordinator.initScripts }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "ducklauncher.fullname" . }}-init-scripts
      {{- end }}
      {{- with .Values.coordinator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
