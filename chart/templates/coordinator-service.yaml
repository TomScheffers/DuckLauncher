{{- if .Values.coordinator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ducklauncher.coordinator.serviceName" . }}
  labels:
    {{- include "ducklauncher.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
  {{- with .Values.coordinator.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.coordinator.service.type }}
  ports:
    - name: http
      port: {{ .Values.coordinator.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ducklauncher.coordinator.selectorLabels" . | nindent 4 }}
{{- end }}
