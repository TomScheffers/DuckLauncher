{{- if and .Values.coordinator.enabled .Values.coordinator.initScripts }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ducklauncher.fullname" . }}-init-scripts
  labels:
    {{- include "ducklauncher.labels" . | nindent 4 }}
data:
  init.sql: |
    {{- .Values.coordinator.initScripts | nindent 4 }}
{{- end }}
