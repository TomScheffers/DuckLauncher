<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuckLauncher</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦆</text></svg>">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --ok: #3dd68c;
      --warn: #f5a524;
      --tree-hover: #243044;
      --sidebar-width: 320px;
      --results-height: 280px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      font: 14px/1.5 system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    header {
      flex: 0 0 auto;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { margin: 0; font-size: 16px; font-weight: 600; }
    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: var(--sidebar-width) 4px minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
    }
    .sidebar {
      grid-column: 1;
      grid-row: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      overflow-y: auto;
    }
    #sidebar-resize {
      grid-column: 2;
      grid-row: 1;
      z-index: 1;
    }
    .editor-pane {
      grid-column: 3;
      grid-row: 1;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) 4px var(--results-height);
      overflow: hidden;
    }
    .editor-area {
      grid-row: 1;
    }
    #results-resize {
      grid-row: 2;
      z-index: 2;
    }
    .results-panel {
      grid-row: 3;
    }
    .resize-handle {
      background: var(--border);
      transition: background 0.15s;
      position: relative;
      touch-action: none;
    }
    .resize-handle:hover,
    .resize-handle.is-active {
      background: var(--accent);
    }
    .resize-handle.is-active {
      transition: none;
    }
    .resize-shield {
      position: fixed;
      inset: 0;
      z-index: 9999;
      cursor: inherit;
    }
    .resize-v {
      width: 4px;
      cursor: col-resize;
    }
    .resize-h {
      height: 4px;
      cursor: row-resize;
    }
    .resize-h::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -5px;
      bottom: -5px;
    }
    .panel {
      display: flex;
      flex-direction: column;
      flex: 0 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .panel:last-child { border-bottom: none; }
    .panel-header {
      flex: 0 0 auto;
      padding: 8px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .panel-header-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 22px;
      height: 22px;
      padding: 0;
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .panel-body {
      flex: 0 0 auto;
      background: var(--panel);
    }
    .history-item {
      display: grid;
      grid-template-columns: 10px 72px 56px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: 7px 10px;
      font-size: 11px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .history-item:hover { background: var(--tree-hover); }
    .history-item.active { background: var(--tree-hover); }
    .history-item:last-child { border-bottom: none; }
    .history-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 8px;
    }
    .history-dot.completed { background: var(--ok); }
    .history-dot.failed, .history-dot.cancelled { background: #f87171; }
    .history-dot.running, .history-dot.pending { background: var(--warn); }
    .history-time { color: var(--muted); white-space: nowrap; }
    .history-runtime { color: var(--muted); white-space: nowrap; text-align: right; }
    .history-query {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--text);
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .list-item:hover { background: var(--tree-hover); }
    .list-item.active { background: var(--tree-hover); }
    .list-item.open .label { color: var(--accent); }
    .list-item:last-child { border-bottom: none; }
    .list-item .meta { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .list-item .label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: ui-monospace, monospace;
    }
    .list-item .actions { display: flex; gap: 4px; }
    .list-item .delete-btn {
      padding: 0 4px;
      font-size: 14px;
      line-height: 1;
      opacity: 0;
      background: transparent;
      border: none;
      color: var(--muted);
    }
    .list-item:hover .delete-btn { opacity: 1; }
    .list-item .delete-btn:hover { color: #f87171; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    .empty {
      color: var(--muted);
      font-size: 12px;
      padding: 12px;
    }
    .tree { list-style: none; margin: 0; padding: 6px 0; }
    .tree ul { list-style: none; margin: 0; padding-left: 14px; }
    .tree-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 6px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
    }
    .tree-item:hover { background: var(--tree-hover); }
    .tree-item.leaf { cursor: default; padding-left: 22px; color: var(--muted); }
    .tree-item.leaf .label { font-family: ui-monospace, monospace; color: var(--text); }
    .tree-item .type { color: var(--muted); margin-left: 6px; font-size: 11px; }
    .chevron {
      width: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 10px;
      flex: 0 0 14px;
    }
    .chevron.empty { visibility: hidden; }
    .label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sheet-tabs {
      flex: 0 0 auto;
      display: flex;
      gap: 2px;
      padding: 6px 8px 0;
      overflow-x: auto;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .sheet-tabs:empty { display: none; }
    .sheet-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      background: var(--bg);
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      max-width: 180px;
      flex: 0 0 auto;
    }
    .sheet-tab.active {
      background: var(--panel);
      color: var(--text);
    }
    .sheet-tab .tab-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sheet-tab .tab-close {
      opacity: 0.6;
      font-size: 14px;
      line-height: 1;
    }
    .sheet-tab .tab-close:hover { opacity: 1; color: #f87171; }
    .editor-toolbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .editor-area {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow: hidden;
    }
    .sql-editor {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    .sql-highlight,
    #query-input {
      position: absolute;
      inset: 0;
      margin: 0;
      padding: 12px;
      border: none;
      font: 13px/1.45 ui-monospace, monospace;
      line-height: 1.45;
      tab-size: 2;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
    }
    .sql-highlight {
      pointer-events: none;
      color: var(--text);
    }
    .sql-highlight code { display: block; min-height: 100%; }
    #query-input {
      resize: none;
      outline: none;
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      z-index: 1;
    }
    #query-input::placeholder { color: var(--muted); }
    .hl-keyword { color: #7eb6ff; }
    .hl-string { color: var(--ok); }
    .hl-comment { color: var(--muted); font-style: italic; }
    .hl-number { color: var(--warn); }
    .results-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow: hidden;
    }
    .results-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .results-header h2 {
      margin: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .results-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.cancel-btn {
      background: #e05252;
    }
    button.cancel-btn:hover {
      background: #c94444;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
    }
    .status.running { color: var(--warn); }
    .status.completed { color: var(--ok); }
    .status.failed, .status.cancelled { color: #f87171; }
    .pager { display: flex; gap: 8px; align-items: center; }
    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 40vh) 4px minmax(0, 1fr);
      }
      .sidebar { grid-column: 1; grid-row: 1; }
      #sidebar-resize { grid-column: 1; grid-row: 2; width: 100%; height: 4px; cursor: row-resize; }
      .editor-pane { grid-column: 1; grid-row: 3; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🦆 DuckLauncher</h1>
    <div class="header-actions">
      <span id="auth-info" class="status" hidden></span>
      <button id="login-btn" class="secondary" hidden>Login</button>
      <button id="logout-btn" class="secondary" hidden>Logout</button>
      <span id="clock" class="status"></span>
    </div>
  </header>

  <div class="workspace">
    <aside class="sidebar">
      <section class="panel workers-panel">
        <div class="panel-header">Workers</div>
        <div class="panel-body">
          <div id="workers-empty" class="empty">No workers registered.</div>
          <table id="workers-table" hidden>
            <thead>
              <tr>
                <th>Worker</th>
                <th>Queries</th>
                <th>Memory</th>
                <th>CPU</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="workers-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel explorer-panel">
        <div class="panel-header">Explorer</div>
        <div class="panel-body">
          <div id="catalog-empty" class="empty">No catalog available.</div>
          <ul id="catalog-tree" class="tree" hidden></ul>
        </div>
      </section>

      <section class="panel sheets-panel" id="sheets-panel">
        <div class="panel-header panel-header-actions">
          <span>Sheets</span>
          <button id="new-sheet-btn" class="icon-btn" type="button" title="New sheet">+</button>
        </div>
        <div class="panel-body">
          <div id="sheets-empty" class="empty">No sheets yet.</div>
          <div id="sheets-list" hidden></div>
        </div>
      </section>

      <section class="panel history-panel" id="history-panel">
        <div class="panel-header">History</div>
        <div class="panel-body">
          <div id="history-empty" class="empty">No queries yet.</div>
          <div id="history-list" hidden></div>
        </div>
      </section>
    </aside>

    <div class="resize-handle resize-v" id="sidebar-resize" aria-hidden="true"></div>

    <section class="editor-pane">
      <div class="editor-area">
        <div class="sheet-tabs" id="sheet-tabs"></div>
        <div class="editor-toolbar">
          <button id="run-btn">Run</button>
          <span id="query-status" class="status"></span>
        </div>
        <div class="sql-editor">
          <pre class="sql-highlight" aria-hidden="true"><code id="sql-highlight-code"></code></pre>
          <textarea id="query-input" placeholder="SELECT 42 AS answer" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
        </div>
      </div>

      <div class="resize-handle resize-h" id="results-resize" aria-hidden="true"></div>

      <section class="results-panel">
        <div class="results-header">
          <h2>Results</h2>
          <div class="pager" id="pager" hidden>
            <button id="prev-page" class="secondary">Prev</button>
            <span id="page-info" class="status"></span>
            <button id="next-page" class="secondary">Next</button>
          </div>
        </div>
        <div id="result-meta" class="status" style="padding: 8px 12px 0;"></div>
        <div class="results-body">
          <div id="result-empty" class="empty">Run a query to see results.</div>
          <table id="result-table" hidden>
            <thead id="result-head"></thead>
            <tbody id="result-body"></tbody>
          </table>
        </div>
      </section>
    </section>
  </div>

  <script>
    const SIDEBAR_WIDTH_KEY = "ducklauncher-sidebar-width";
    const RESULTS_HEIGHT_KEY = "ducklauncher-results-height";

    const editorPane = document.querySelector(".editor-pane");
    const queryInput = document.getElementById("query-input");
    const sqlHighlightCode = document.getElementById("sql-highlight-code");
    const sqlHighlightPre = document.querySelector(".sql-highlight");

    const SQL_KEYWORDS = new Set([
      "SELECT", "FROM", "WHERE", "JOIN", "LEFT", "RIGHT", "INNER", "OUTER", "FULL", "CROSS", "ON",
      "AND", "OR", "NOT", "GROUP", "BY", "ORDER", "HAVING", "LIMIT", "OFFSET", "AS", "DISTINCT",
      "UNION", "ALL", "INSERT", "INTO", "VALUES", "UPDATE", "SET", "DELETE", "CREATE", "DROP",
      "ALTER", "TABLE", "INDEX", "VIEW", "WITH", "CASE", "WHEN", "THEN", "ELSE", "END", "NULL",
      "IS", "IN", "EXISTS", "LIKE", "BETWEEN", "CAST", "COUNT", "SUM", "AVG", "MIN", "MAX",
      "TRUE", "FALSE", "ASC", "DESC", "PRIMARY", "KEY", "FOREIGN", "REFERENCES", "DEFAULT",
      "RETURNING", "OVER", "PARTITION", "WINDOW", "LATERAL", "NATURAL", "USING", "ILIKE",
    ]);

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function highlightSql(sql) {
      let html = "";
      let i = 0;
      while (i < sql.length) {
        if (sql[i] === "-" && sql[i + 1] === "-") {
          let end = sql.indexOf("\n", i);
          if (end === -1) end = sql.length;
          html += `<span class="hl-comment">${escapeHtml(sql.slice(i, end))}</span>`;
          i = end;
          continue;
        }
        if (sql[i] === "/" && sql[i + 1] === "*") {
          const end = sql.indexOf("*/", i + 2);
          const stop = end === -1 ? sql.length : end + 2;
          html += `<span class="hl-comment">${escapeHtml(sql.slice(i, stop))}</span>`;
          i = stop;
          continue;
        }
        if (sql[i] === "'") {
          let j = i + 1;
          while (j < sql.length) {
            if (sql[j] === "'" && sql[j + 1] === "'") {
              j += 2;
              continue;
            }
            if (sql[j] === "'") {
              j += 1;
              break;
            }
            j += 1;
          }
          html += `<span class="hl-string">${escapeHtml(sql.slice(i, j))}</span>`;
          i = j;
          continue;
        }
        if (sql[i] === '"') {
          let j = i + 1;
          while (j < sql.length && sql[j] !== '"') j += 1;
          j += 1;
          html += `<span class="hl-string">${escapeHtml(sql.slice(i, j))}</span>`;
          i = j;
          continue;
        }
        if (/[0-9]/.test(sql[i]) || (sql[i] === "." && /[0-9]/.test(sql[i + 1]))) {
          let j = i;
          while (j < sql.length && /[0-9._]/.test(sql[j])) j += 1;
          html += `<span class="hl-number">${escapeHtml(sql.slice(i, j))}</span>`;
          i = j;
          continue;
        }
        if (/[a-zA-Z_]/.test(sql[i])) {
          let j = i;
          while (j < sql.length && /[a-zA-Z0-9_]/.test(sql[j])) j += 1;
          const word = sql.slice(i, j);
          if (SQL_KEYWORDS.has(word.toUpperCase())) {
            html += `<span class="hl-keyword">${escapeHtml(word)}</span>`;
          } else {
            html += escapeHtml(word);
          }
          i = j;
          continue;
        }
        html += escapeHtml(sql[i]);
        i += 1;
      }
      return html;
    }

    function syncSqlScroll() {
      sqlHighlightPre.scrollTop = queryInput.scrollTop;
      sqlHighlightPre.scrollLeft = queryInput.scrollLeft;
    }

    function updateSqlHighlight() {
      const text = queryInput.value;
      sqlHighlightCode.innerHTML = highlightSql(text) + (text.endsWith("\n") ? "\n" : "");
      syncSqlScroll();
    }

    function setQuerySql(sql) {
      queryInput.value = sql;
      updateSqlHighlight();
      syncActiveOpenSheet();
    }

    function getQuerySql() {
      return queryInput.value;
    }

    function getOpenSheet(sheetId) {
      return openSheets.find((sheet) => sheet.id === sheetId);
    }

    function syncActiveOpenSheet() {
      if (!activeSheetId) return;
      const sheet = getOpenSheet(activeSheetId);
      if (sheet) sheet.sql = getQuerySql();
    }

    function loadPanelSizes() {
      const sidebar = localStorage.getItem(SIDEBAR_WIDTH_KEY);
      const results = localStorage.getItem(RESULTS_HEIGHT_KEY);
      if (sidebar) {
        document.documentElement.style.setProperty("--sidebar-width", `${sidebar}px`);
      }
      if (results) {
        document.documentElement.style.setProperty("--results-height", `${results}px`);
        editorPane.style.gridTemplateRows = `minmax(0, 1fr) 4px ${results}px`;
      }
    }

    function setupResize(handle, { axis, getContainer, getSize, setSize, min, max, storageKey }) {
      handle.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) return;
        event.preventDefault();
        event.stopPropagation();

        const container = getContainer();
        const startPos = axis === "x" ? event.clientX : event.clientY;
        const startSize = getSize();
        const cursor = axis === "x" ? "col-resize" : "row-resize";

        handle.classList.add("is-active");
        handle.setPointerCapture(event.pointerId);

        const shield = document.createElement("div");
        shield.className = "resize-shield";
        shield.style.cursor = cursor;
        document.body.appendChild(shield);
        document.body.style.userSelect = "none";

        function applySize(moveEvent) {
          const currentPos = axis === "x" ? moveEvent.clientX : moveEvent.clientY;
          const delta = currentPos - startPos;
          const sizeDelta = axis === "y" ? -delta : delta;
          const maxSize = typeof max === "function" ? max(container) : max;
          const nextSize = Math.min(maxSize, Math.max(min, startSize + sizeDelta));
          setSize(nextSize);
        }

        function onUp() {
          handle.releasePointerCapture(event.pointerId);
          handle.removeEventListener("pointermove", applySize);
          handle.removeEventListener("pointerup", onUp);
          handle.removeEventListener("pointercancel", onUp);
          handle.classList.remove("is-active");
          shield.remove();
          document.body.style.userSelect = "";
          localStorage.setItem(storageKey, String(Math.round(getSize())));
        }

        handle.addEventListener("pointermove", applySize);
        handle.addEventListener("pointerup", onUp);
        handle.addEventListener("pointercancel", onUp);
      });
    }

    loadPanelSizes();

    setupResize(document.getElementById("sidebar-resize"), {
      axis: "x",
      storageKey: SIDEBAR_WIDTH_KEY,
      getContainer: () => document.querySelector(".workspace"),
      getSize: () => parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--sidebar-width")),
      setSize: (width) =>
        document.documentElement.style.setProperty("--sidebar-width", `${width}px`),
      min: 240,
      max: (container) => container.getBoundingClientRect().width * 0.5,
    });

    setupResize(document.getElementById("results-resize"), {
      axis: "y",
      storageKey: RESULTS_HEIGHT_KEY,
      getContainer: () => editorPane,
      getSize: () => {
        const rows = getComputedStyle(editorPane).gridTemplateRows.split(" ");
        return parseFloat(rows[2]);
      },
      setSize: (height) => {
        editorPane.style.gridTemplateRows = `minmax(0, 1fr) 4px ${height}px`;
        document.documentElement.style.setProperty("--results-height", `${height}px`);
      },
      min: 120,
      max: (container) => container.getBoundingClientRect().height - 140,
    });

    const PAGE_SIZE = 50;
    let currentQueryId = null;
    let resultOffset = 0;
    let resultTotal = 0;
    let queryEventSource = null;
    let queryRunning = false;
    let authState = { auth_enabled: false, authenticated: false, anonymous: true, user: null };
    let openSheets = [];
    let activeSheetId = null;
    let currentHistoryQueryId = null;
    let sheetSaveTimer = null;
    const SHEET_SAVE_DELAY_MS = 600;
    const resultsPanel = document.querySelector(".results-panel");
    const expandedNodes = new Set();

    function setRunButtonMode(mode) {
      const btn = document.getElementById("run-btn");
      if (mode === "run") {
        queryRunning = false;
        btn.textContent = "Run";
        btn.disabled = false;
        btn.classList.remove("cancel-btn");
      } else if (mode === "cancel") {
        queryRunning = true;
        btn.textContent = "Cancel";
        btn.disabled = false;
        btn.classList.add("cancel-btn");
      } else {
        btn.disabled = true;
      }
    }

    function fmtPct(value) {
      if (value == null) return "—";
      return `${Math.round(value)}%`;
    }

    function fmtMemory(used, total) {
      if (used == null) return `${total} MB`;
      return `${used} / ${total} MB`;
    }

    function shortId(id) {
      return id ? id.slice(0, 8) : "—";
    }

    function nodeKey(parts) {
      return parts.join(".");
    }

    async function api(path, options = {}) {
      const response = await fetch(path, { credentials: "include", ...options });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || response.statusText);
      }
      if (response.status === 204) return null;
      return response.json();
    }

    async function refreshWorkers() {
      const workers = await api("/workers");
      const table = document.getElementById("workers-table");
      const empty = document.getElementById("workers-empty");
      const body = document.getElementById("workers-body");
      body.innerHTML = "";

      if (!workers.length) {
        table.hidden = true;
        empty.hidden = false;
        return;
      }

      empty.hidden = true;
      table.hidden = false;
      for (const worker of workers) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td title="${worker.endpoint}">${shortId(worker.worker_id)}</td>
          <td>${worker.running_queries} / ${worker.max_concurrent_queries}</td>
          <td>${fmtMemory(worker.memory_used_mb, worker.memory)}</td>
          <td>${fmtPct(worker.cpu_usage)}</td>
          <td>${worker.status}</td>
        `;
        body.appendChild(row);
      }
    }

    function createTreeNode(label, key, children, options = {}) {
      const li = document.createElement("li");
      const hasChildren = children.length > 0;
      const isOpen = expandedNodes.has(key);
      const row = document.createElement("div");
      row.className = "tree-item" + (options.leaf ? " leaf" : "");
      row.innerHTML = `
        <span class="chevron ${hasChildren ? "" : "empty"}">${hasChildren ? (isOpen ? "▼" : "▶") : ""}</span>
        <span class="label">${label}</span>
        ${options.type ? `<span class="type">${options.type}</span>` : ""}
      `;

      const childList = document.createElement("ul");
      childList.hidden = !isOpen;
      for (const child of children) {
        childList.appendChild(child);
      }

      if (hasChildren) {
        row.addEventListener("click", (event) => {
          event.stopPropagation();
          if (expandedNodes.has(key)) {
            expandedNodes.delete(key);
          } else {
            expandedNodes.add(key);
          }
          refreshCatalogTree();
        });
      }

      if (options.onActivate) {
        row.addEventListener("dblclick", (event) => {
          event.stopPropagation();
          options.onActivate();
        });
      }

      li.appendChild(row);
      if (hasChildren) li.appendChild(childList);
      return li;
    }

    function renderCatalog(catalog) {
      const tree = document.getElementById("catalog-tree");
      const empty = document.getElementById("catalog-empty");
      tree.innerHTML = "";

      if (!catalog.databases.length) {
        tree.hidden = true;
        empty.hidden = false;
        empty.textContent = "No databases found.";
        return;
      }

      empty.hidden = true;
      tree.hidden = false;

      for (const database of catalog.databases) {
        const dbKey = nodeKey([database.name]);
        const schemaNodes = database.schemas.map((schema) => {
          const schemaKey = nodeKey([database.name, schema.name]);
          const tableNodes = schema.tables.map((table) => {
            const tableKey = nodeKey([database.name, schema.name, table.name]);
            const qualified = `${database.name}.${schema.name}.${table.name}`;
            const columnNodes = table.columns.map((column) =>
              createTreeNode(column.name, nodeKey([qualified, column.name]), [], {
                leaf: true,
                type: column.type,
              })
            );
            return createTreeNode(table.name, tableKey, columnNodes, {
              onActivate: () => insertText(qualified),
            });
          });
          return createTreeNode(schema.name, schemaKey, tableNodes);
        });
        tree.appendChild(createTreeNode(database.name, dbKey, schemaNodes));
      }
    }

    let catalogTree = null;

    function refreshCatalogTree() {
      if (catalogTree) renderCatalog(catalogTree);
    }

    async function refreshCatalog() {
      try {
        catalogTree = await api("/catalog");
        renderCatalog(catalogTree);
      } catch {
        catalogTree = null;
        document.getElementById("catalog-tree").hidden = true;
        const empty = document.getElementById("catalog-empty");
        empty.hidden = false;
        empty.textContent = "No catalog available.";
      }
    }

    function updateAuthUi() {
      const loginBtn = document.getElementById("login-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const authInfo = document.getElementById("auth-info");

      if (authState.authenticated) {
        const label = authState.user?.name || authState.user?.email || "Signed in";
        authInfo.textContent = label;
        authInfo.hidden = false;
        loginBtn.hidden = true;
        logoutBtn.hidden = false;
      } else {
        authInfo.hidden = true;
        loginBtn.hidden = !authState.auth_enabled;
        logoutBtn.hidden = true;
      }
    }

    async function refreshAuth() {
      authState = await api("/auth/me");
      updateAuthUi();
      await Promise.all([refreshSheets(), refreshHistory()]);
    }

    function formatRelativeTime(iso) {
      const diffMs = Date.now() - new Date(iso).getTime();
      const sec = Math.max(0, Math.floor(diffMs / 1000));
      if (sec < 60) return `${sec}s ago`;
      const min = Math.floor(sec / 60);
      if (min < 60) return min === 1 ? "1 minute ago" : `${min} minutes ago`;
      const hours = Math.floor(min / 60);
      if (hours < 24) return hours === 1 ? "1 hour ago" : `${hours} hours ago`;
      const days = Math.floor(hours / 24);
      return days === 1 ? "1 day ago" : `${days} days ago`;
    }

    function formatRuntime(query) {
      if (!query.started_at) return "—";
      if (query.status === "pending") return "pending";
      if (query.status === "running") return "running";
      if (!query.completed_at) return "—";
      const ms = new Date(query.completed_at).getTime() - new Date(query.started_at).getTime();
      if (ms < 1000) return `${ms}ms`;
      if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
      const min = Math.floor(ms / 60000);
      const sec = Math.floor((ms % 60000) / 1000);
      return `${min}m ${sec}s`;
    }

    function querySnippet(sql, max = 64) {
      const oneLine = sql.replace(/\s+/g, " ").trim();
      return oneLine.length > max ? `${oneLine.slice(0, max)}…` : oneLine;
    }

    function highlightActiveHistory() {
      document.querySelectorAll("#history-list .history-item").forEach((item) => {
        item.classList.toggle(
          "active",
          currentHistoryQueryId != null && item.dataset.queryId === String(currentHistoryQueryId)
        );
      });
    }

    function showResultsPanel() {
      resultsPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    async function openHistoryQuery(query) {
      stopQueryEvents();
      currentHistoryQueryId = query.query_id;
      currentQueryId = query.query_id;
      setQuerySql(query.query);
      setQueryStatus(query.status, query.status);
      highlightActiveHistory();
      showResultsPanel();

      if (query.status === "completed") {
        setRunButtonMode("run");
        if (query.result_row_count != null && query.result_row_count > 0) {
          resultOffset = 0;
          await loadResultPage();
        } else {
          hideResultTable();
          document.getElementById("result-meta").textContent = "Query completed with no result rows.";
          document.getElementById("result-empty").textContent = "Query completed with no result rows.";
          document.getElementById("result-empty").hidden = false;
        }
        return;
      }

      if (query.status === "running" || query.status === "pending") {
        setRunButtonMode("cancel");
        hideResultTable();
        document.getElementById("result-meta").textContent = "";
        document.getElementById("result-empty").textContent = "Query is still running...";
        document.getElementById("result-empty").hidden = false;
        watchQuery(query.query_id);
        return;
      }

      setRunButtonMode("run");
      hideResultTable();
      if (query.error) {
        document.getElementById("result-meta").textContent = query.error;
        document.getElementById("result-empty").textContent = query.error;
      } else {
        document.getElementById("result-meta").textContent = `Query ${query.status}`;
        document.getElementById("result-empty").textContent = `Query ${query.status}`;
      }
      document.getElementById("result-empty").hidden = false;
    }

    async function refreshHistory() {
      const list = document.getElementById("history-list");
      const empty = document.getElementById("history-empty");
      list.innerHTML = "";
      const queries = await api("/queries/mine?limit=50");
      const ran = queries.filter((q) =>
        ["running", "completed", "failed", "cancelled"].includes(q.status)
      );
      if (!ran.length) {
        list.hidden = true;
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      list.hidden = false;
      for (const query of ran) {
        const item = document.createElement("div");
        item.className = "history-item";
        item.dataset.queryId = query.query_id;
        const when = query.completed_at || query.started_at || query.created_at;
        item.innerHTML = `
          <span class="history-dot ${query.status}" aria-hidden="true"></span>
          <span class="history-time">${formatRelativeTime(when)}</span>
          <span class="history-runtime">${formatRuntime(query)}</span>
          <span class="history-query" title="${query.query.replace(/"/g, "&quot;")}">${querySnippet(query.query)}</span>
        `;
        item.addEventListener("click", () => {
          openHistoryQuery(query).catch((err) => setQueryStatus(err.message, "failed"));
        });
        list.appendChild(item);
      }
      highlightActiveHistory();
    }

    function renderSheetTabs() {
      const bar = document.getElementById("sheet-tabs");
      bar.innerHTML = "";
      for (const sheet of openSheets) {
        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = "sheet-tab" + (sheet.id === activeSheetId ? " active" : "");
        tab.innerHTML = `
          <span class="tab-name" title="${escapeHtml(sheet.name)}">${escapeHtml(sheet.name)}</span>
          <span class="tab-close" title="Close">×</span>
        `;
        tab.addEventListener("click", () => {
          switchToSheet(sheet.id).catch((err) => setQueryStatus(err.message, "failed"));
        });
        tab.querySelector(".tab-close").addEventListener("click", (event) => {
          event.stopPropagation();
          closeSheet(sheet.id).catch((err) => setQueryStatus(err.message, "failed"));
        });
        tab.querySelector(".tab-name").addEventListener("dblclick", (event) => {
          event.stopPropagation();
          renameSheetById(sheet.id, sheet.name).catch((err) => setQueryStatus(err.message, "failed"));
        });
        bar.appendChild(tab);
      }
    }

    function highlightActiveSheet() {
      document.querySelectorAll("#sheets-list .list-item").forEach((item) => {
        item.classList.toggle(
          "active",
          activeSheetId != null && item.dataset.sheetId === String(activeSheetId)
        );
        item.classList.toggle("open", openSheets.some((sheet) => sheet.id === item.dataset.sheetId));
      });
    }

    function scheduleSheetSave() {
      if (!activeSheetId) return;
      clearTimeout(sheetSaveTimer);
      sheetSaveTimer = setTimeout(() => {
        autoSaveCurrentSheet().catch((err) => setQueryStatus(err.message, "failed"));
      }, SHEET_SAVE_DELAY_MS);
    }

    async function flushSheetSave(sheetId) {
      if (!sheetId) return;
      clearTimeout(sheetSaveTimer);
      sheetSaveTimer = null;
      const sheet = getOpenSheet(sheetId);
      if (!sheet) return;
      if (sheetId === activeSheetId) syncActiveOpenSheet();
      await api(`/sheets/${sheetId}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sql: sheet.sql }),
      });
    }

    async function autoSaveCurrentSheet() {
      if (!activeSheetId) return;
      syncActiveOpenSheet();
      await flushSheetSave(activeSheetId);
    }

    async function renameSheetById(sheetId, currentName) {
      const name = prompt("Rename sheet", currentName);
      if (!name || !name.trim() || name.trim() === currentName) return;
      const trimmed = name.trim();
      await api(`/sheets/${sheetId}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: trimmed }),
      });
      const open = getOpenSheet(sheetId);
      if (open) open.name = trimmed;
      await refreshSheets();
      renderSheetTabs();
    }

    async function switchToSheet(sheetId) {
      if (activeSheetId === sheetId) return;
      syncActiveOpenSheet();
      if (activeSheetId) await flushSheetSave(activeSheetId);
      activeSheetId = sheetId;
      const sheet = getOpenSheet(sheetId);
      queryInput.value = sheet ? sheet.sql : "";
      updateSqlHighlight();
      renderSheetTabs();
      highlightActiveSheet();
      queryInput.focus();
    }

    function openSheetFromSidebar(sheet) {
      const existing = getOpenSheet(sheet.sheet_id);
      if (!existing) {
        openSheets.push({ id: sheet.sheet_id, name: sheet.name, sql: sheet.sql });
      } else {
        existing.name = sheet.name;
      }
      switchToSheet(sheet.sheet_id).catch((err) => setQueryStatus(err.message, "failed"));
    }

    async function closeSheet(sheetId) {
      const index = openSheets.findIndex((sheet) => sheet.id === sheetId);
      if (index === -1) return;
      if (activeSheetId === sheetId) await flushSheetSave(sheetId);
      openSheets.splice(index, 1);
      if (activeSheetId === sheetId) {
        if (openSheets.length) {
          const next = openSheets[Math.min(index, openSheets.length - 1)];
          activeSheetId = null;
          await switchToSheet(next.id);
        } else {
          activeSheetId = null;
          setQuerySql("");
          renderSheetTabs();
          highlightActiveSheet();
        }
      } else {
        renderSheetTabs();
        highlightActiveSheet();
      }
    }

    async function createNewSheet() {
      syncActiveOpenSheet();
      if (activeSheetId) await flushSheetSave(activeSheetId);
      const sheets = await api("/sheets");
      const created = await api("/sheets", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: `Sheet ${sheets.length + 1}`, sql: "" }),
      });
      openSheets.push({ id: created.sheet_id, name: created.name, sql: "" });
      activeSheetId = null;
      await switchToSheet(created.sheet_id);
      await refreshSheets();
    }

    async function refreshSheets() {
      const list = document.getElementById("sheets-list");
      const empty = document.getElementById("sheets-empty");
      list.innerHTML = "";
      const sheets = await api("/sheets");
      for (const sheet of sheets) {
        const open = getOpenSheet(sheet.sheet_id);
        if (open) open.name = sheet.name;
      }
      renderSheetTabs();
      if (!sheets.length) {
        list.hidden = true;
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      list.hidden = false;
      for (const sheet of sheets) {
        const item = document.createElement("div");
        item.className = "list-item";
        item.dataset.sheetId = sheet.sheet_id;
        if (openSheets.some((open) => open.id === sheet.sheet_id)) {
          item.classList.add("open");
        }
        item.innerHTML = `
          <span class="label" title="${escapeHtml(sheet.name)}">${escapeHtml(sheet.name)}</span>
          <button class="delete-btn" type="button" title="Delete sheet" aria-label="Delete sheet">×</button>
        `;
        item.addEventListener("click", () => openSheetFromSidebar(sheet));
        item.querySelector(".label").addEventListener("dblclick", (event) => {
          event.stopPropagation();
          renameSheetById(sheet.sheet_id, sheet.name).catch((err) => setQueryStatus(err.message, "failed"));
        });
        item.querySelector(".delete-btn").addEventListener("click", async (event) => {
          event.stopPropagation();
          await api(`/sheets/${sheet.sheet_id}`, { method: "DELETE" });
          await closeSheet(sheet.sheet_id);
          await refreshSheets();
        });
        list.appendChild(item);
      }
      highlightActiveSheet();
    }

    function insertText(text) {
      const start = queryInput.selectionStart;
      const end = queryInput.selectionEnd;
      const before = queryInput.value.slice(0, start);
      const after = queryInput.value.slice(end);
      setQuerySql(`${before}${text}${after}`);
      const cursor = start + text.length;
      queryInput.selectionStart = cursor;
      queryInput.selectionEnd = cursor;
      queryInput.focus();
      scheduleSheetSave();
    }

    function setQueryStatus(text, statusClass) {
      const el = document.getElementById("query-status");
      el.textContent = text;
      el.className = "status" + (statusClass ? ` ${statusClass}` : "");
    }

    function hideResultTable() {
      document.getElementById("result-table").hidden = true;
      document.getElementById("result-empty").hidden = false;
      document.getElementById("pager").hidden = true;
    }

    function stopQueryEvents() {
      if (queryEventSource) {
        queryEventSource.close();
        queryEventSource = null;
      }
    }

    async function finishQuery(query) {
      setRunButtonMode("run");
      if (query.status === "completed" && query.result_row_count != null) {
        resultOffset = 0;
        resultTotal = query.result_row_count;
        await loadResultPage();
      } else if (query.error) {
        document.getElementById("result-meta").textContent = query.error;
        hideResultTable();
        document.getElementById("result-empty").textContent = query.error;
      } else {
        document.getElementById("result-meta").textContent = "Query finished without result rows.";
        hideResultTable();
        document.getElementById("result-empty").textContent = "Query finished without result rows.";
      }
    }

    async function handleQueryEvent(query) {
      setQueryStatus(query.status, query.status);
      if (query.status === "pending" || query.status === "running") {
        setRunButtonMode("cancel");
        return;
      }
      stopQueryEvents();
      await finishQuery(query);
      refreshHistory().catch(() => {});
    }

    function watchQuery(queryId) {
      stopQueryEvents();
      const source = new EventSource(`/queries/${queryId}/events`);
      queryEventSource = source;

      source.addEventListener("status", (event) => {
        handleQueryEvent(JSON.parse(event.data)).catch((err) => {
          setRunButtonMode("run");
          setQueryStatus(err.message || "Failed to handle query update", "failed");
        });
      });

      source.onerror = async () => {
        stopQueryEvents();
        if (!queryRunning) return;
        try {
          await handleQueryEvent(await api(`/queries/${queryId}`));
        } catch (err) {
          setRunButtonMode("run");
          setQueryStatus(err.message || "Lost query event stream", "failed");
        }
      };
    }

    async function loadResultPage() {
      if (!currentQueryId) return;
      const page = await api(
        `/queries/${currentQueryId}/result?offset=${resultOffset}&limit=${PAGE_SIZE}`
      );
      resultTotal = page.total_rows;

      const head = document.getElementById("result-head");
      const body = document.getElementById("result-body");
      head.innerHTML = `<tr>${page.columns.map((c) => `<th>${c}</th>`).join("")}</tr>`;
      body.innerHTML = page.rows
        .map((row) => `<tr>${row.map((cell) => `<td>${cell ?? ""}</td>`).join("")}</tr>`)
        .join("");

      document.getElementById("result-table").hidden = false;
      document.getElementById("result-empty").hidden = true;
      document.getElementById("result-meta").textContent = `${resultTotal} row(s)`;

      const pager = document.getElementById("pager");
      pager.hidden = resultTotal <= PAGE_SIZE;
      document.getElementById("page-info").textContent =
        `${resultOffset + 1}-${Math.min(resultOffset + PAGE_SIZE, resultTotal)} of ${resultTotal}`;
      document.getElementById("prev-page").disabled = resultOffset === 0;
      document.getElementById("next-page").disabled = resultOffset + PAGE_SIZE >= resultTotal;
    }

    async function runQuery() {
      const sql = getQuerySql().trim();
      if (!sql) return;

      stopQueryEvents();
      currentQueryId = null;
      hideResultTable();
      document.getElementById("result-empty").textContent = "Running query...";
      document.getElementById("result-meta").textContent = "";
      setRunButtonMode("disabled");
      setQueryStatus("submitting");

      const created = await api("/queries", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: sql }),
      });

      currentQueryId = created.query_id;
      currentHistoryQueryId = created.query_id;
      setQueryStatus(created.status, created.status);
      setRunButtonMode("cancel");
      watchQuery(currentQueryId);
      refreshHistory().catch(() => {});
    }

    async function cancelQuery() {
      if (!currentQueryId) return;
      setRunButtonMode("disabled");
      setQueryStatus("cancelling", "running");
      await api(`/queries/${currentQueryId}/cancel`, { method: "POST" });
    }

    document.getElementById("run-btn").addEventListener("click", () => {
      const action = queryRunning ? cancelQuery() : runQuery();
      action.catch((err) => {
        setRunButtonMode("run");
        setQueryStatus(err.message || "Request failed", "failed");
      });
    });

    queryInput.addEventListener("input", () => {
      updateSqlHighlight();
      syncActiveOpenSheet();
      scheduleSheetSave();
    });
    queryInput.addEventListener("scroll", syncSqlScroll);
    queryInput.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        event.preventDefault();
        document.getElementById("run-btn").click();
      }
    });

    document.getElementById("prev-page").addEventListener("click", () => {
      resultOffset = Math.max(0, resultOffset - PAGE_SIZE);
      loadResultPage().catch((err) => setQueryStatus(err.message, "failed"));
    });

    document.getElementById("next-page").addEventListener("click", () => {
      resultOffset += PAGE_SIZE;
      loadResultPage().catch((err) => setQueryStatus(err.message, "failed"));
    });

    document.getElementById("login-btn").addEventListener("click", () => {
      window.location.href = "/auth/login";
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      api("/auth/logout", { method: "POST" })
        .then(() => refreshAuth())
        .catch(() => {});
    });

    document.getElementById("new-sheet-btn").addEventListener("click", () => {
      createNewSheet().catch((err) => setQueryStatus(err.message, "failed"));
    });

    setInterval(() => {
      document.getElementById("clock").textContent = new Date().toLocaleTimeString();
      refreshWorkers().catch(() => {});
    }, 2000);

    updateSqlHighlight();
    refreshAuth().catch(() => {});
    refreshWorkers().catch(() => {});
    refreshCatalog().catch(() => {});
    setInterval(() => refreshCatalog().catch(() => {}), 10000);
  </script>
</body>
</html>
