<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuckLauncher</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦆</text></svg>">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --ok: #3dd68c;
      --warn: #f5a524;
      --tree-hover: #243044;
      --sidebar-width: 320px;
      --results-height: 280px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      font: 14px/1.5 system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    header {
      flex: 0 0 auto;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { margin: 0; font-size: 16px; font-weight: 600; }
    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: var(--sidebar-width) 4px minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
    }
    .sidebar {
      grid-column: 1;
      grid-row: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-resize {
      grid-column: 2;
      grid-row: 1;
      z-index: 1;
    }
    .editor-pane {
      grid-column: 3;
      grid-row: 1;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) 4px var(--results-height);
      overflow: hidden;
    }
    .editor-area {
      grid-row: 1;
    }
    #results-resize {
      grid-row: 2;
      z-index: 2;
    }
    .results-panel {
      grid-row: 3;
    }
    .resize-handle {
      background: var(--border);
      transition: background 0.15s;
      position: relative;
      touch-action: none;
    }
    .resize-handle:hover,
    .resize-handle.is-active {
      background: var(--accent);
    }
    .resize-handle.is-active {
      transition: none;
    }
    .resize-shield {
      position: fixed;
      inset: 0;
      z-index: 9999;
      cursor: inherit;
    }
    .resize-v {
      width: 4px;
      cursor: col-resize;
    }
    .resize-h {
      height: 4px;
      cursor: row-resize;
    }
    .resize-h::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -5px;
      bottom: -5px;
    }
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-bottom: 1px solid var(--border);
    }
    .panel:last-child { border-bottom: none; }
    .panel-header {
      flex: 0 0 auto;
      padding: 8px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .panel-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: var(--panel);
    }
    .workers-panel { flex: 0 0 auto; max-height: 220px; }
    .explorer-panel { flex: 1; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    .empty {
      color: var(--muted);
      font-size: 12px;
      padding: 12px;
    }
    .tree { list-style: none; margin: 0; padding: 6px 0; }
    .tree ul { list-style: none; margin: 0; padding-left: 14px; }
    .tree-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 6px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
    }
    .tree-item:hover { background: var(--tree-hover); }
    .tree-item.leaf { cursor: default; padding-left: 22px; color: var(--muted); }
    .tree-item.leaf .label { font-family: ui-monospace, monospace; color: var(--text); }
    .tree-item .type { color: var(--muted); margin-left: 6px; font-size: 11px; }
    .chevron {
      width: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 10px;
      flex: 0 0 14px;
    }
    .chevron.empty { visibility: hidden; }
    .label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .editor-toolbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .editor-area {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow: hidden;
    }
    #query-input {
      flex: 1;
      width: 100%;
      min-height: 0;
      resize: none;
      border: none;
      outline: none;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      font: 13px/1.45 ui-monospace, monospace;
    }
    .results-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow: hidden;
    }
    .results-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .results-header h2 {
      margin: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .results-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.cancel-btn {
      background: #e05252;
    }
    button.cancel-btn:hover {
      background: #c94444;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
    }
    .status.running { color: var(--warn); }
    .status.completed { color: var(--ok); }
    .status.failed, .status.cancelled { color: #f87171; }
    .pager { display: flex; gap: 8px; align-items: center; }
    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 40vh) 4px minmax(0, 1fr);
      }
      .sidebar { grid-column: 1; grid-row: 1; }
      #sidebar-resize { grid-column: 1; grid-row: 2; width: 100%; height: 4px; cursor: row-resize; }
      .editor-pane { grid-column: 1; grid-row: 3; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🦆 DuckLauncher</h1>
    <span id="clock" class="status"></span>
  </header>

  <div class="workspace">
    <aside class="sidebar">
      <section class="panel workers-panel">
        <div class="panel-header">Workers</div>
        <div class="panel-body">
          <div id="workers-empty" class="empty">No workers registered.</div>
          <table id="workers-table" hidden>
            <thead>
              <tr>
                <th>Worker</th>
                <th>Queries</th>
                <th>Memory</th>
                <th>CPU</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="workers-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel explorer-panel">
        <div class="panel-header">Database Explorer</div>
        <div class="panel-body">
          <div id="catalog-empty" class="empty">No catalog available.</div>
          <ul id="catalog-tree" class="tree" hidden></ul>
        </div>
      </section>
    </aside>

    <div class="resize-handle resize-v" id="sidebar-resize" aria-hidden="true"></div>

    <section class="editor-pane">
      <div class="editor-area">
        <div class="editor-toolbar">
          <button id="run-btn">Run</button>
          <span id="query-status" class="status"></span>
        </div>
        <textarea id="query-input" placeholder="SELECT 42 AS answer" spellcheck="false"></textarea>
      </div>

      <div class="resize-handle resize-h" id="results-resize" aria-hidden="true"></div>

      <section class="results-panel">
        <div class="results-header">
          <h2>Results</h2>
          <div class="pager" id="pager" hidden>
            <button id="prev-page" class="secondary">Prev</button>
            <span id="page-info" class="status"></span>
            <button id="next-page" class="secondary">Next</button>
          </div>
        </div>
        <div id="result-meta" class="status" style="padding: 8px 12px 0;"></div>
        <div class="results-body">
          <div id="result-empty" class="empty">Run a query to see results.</div>
          <table id="result-table" hidden>
            <thead id="result-head"></thead>
            <tbody id="result-body"></tbody>
          </table>
        </div>
      </section>
    </section>
  </div>

  <script>
    const SIDEBAR_WIDTH_KEY = "ducklauncher-sidebar-width";
    const RESULTS_HEIGHT_KEY = "ducklauncher-results-height";

    const editorPane = document.querySelector(".editor-pane");

    function loadPanelSizes() {
      const sidebar = localStorage.getItem(SIDEBAR_WIDTH_KEY);
      const results = localStorage.getItem(RESULTS_HEIGHT_KEY);
      if (sidebar) {
        document.documentElement.style.setProperty("--sidebar-width", `${sidebar}px`);
      }
      if (results) {
        document.documentElement.style.setProperty("--results-height", `${results}px`);
        editorPane.style.gridTemplateRows = `minmax(0, 1fr) 4px ${results}px`;
      }
    }

    function setupResize(handle, { axis, getContainer, getSize, setSize, min, max, storageKey }) {
      handle.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) return;
        event.preventDefault();
        event.stopPropagation();

        const container = getContainer();
        const startPos = axis === "x" ? event.clientX : event.clientY;
        const startSize = getSize();
        const cursor = axis === "x" ? "col-resize" : "row-resize";

        handle.classList.add("is-active");
        handle.setPointerCapture(event.pointerId);

        const shield = document.createElement("div");
        shield.className = "resize-shield";
        shield.style.cursor = cursor;
        document.body.appendChild(shield);
        document.body.style.userSelect = "none";

        function applySize(moveEvent) {
          const currentPos = axis === "x" ? moveEvent.clientX : moveEvent.clientY;
          const delta = currentPos - startPos;
          const sizeDelta = axis === "y" ? -delta : delta;
          const maxSize = typeof max === "function" ? max(container) : max;
          const nextSize = Math.min(maxSize, Math.max(min, startSize + sizeDelta));
          setSize(nextSize);
        }

        function onUp() {
          handle.releasePointerCapture(event.pointerId);
          handle.removeEventListener("pointermove", applySize);
          handle.removeEventListener("pointerup", onUp);
          handle.removeEventListener("pointercancel", onUp);
          handle.classList.remove("is-active");
          shield.remove();
          document.body.style.userSelect = "";
          localStorage.setItem(storageKey, String(Math.round(getSize())));
        }

        handle.addEventListener("pointermove", applySize);
        handle.addEventListener("pointerup", onUp);
        handle.addEventListener("pointercancel", onUp);
      });
    }

    loadPanelSizes();

    setupResize(document.getElementById("sidebar-resize"), {
      axis: "x",
      storageKey: SIDEBAR_WIDTH_KEY,
      getContainer: () => document.querySelector(".workspace"),
      getSize: () => parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--sidebar-width")),
      setSize: (width) =>
        document.documentElement.style.setProperty("--sidebar-width", `${width}px`),
      min: 240,
      max: (container) => container.getBoundingClientRect().width * 0.5,
    });

    setupResize(document.getElementById("results-resize"), {
      axis: "y",
      storageKey: RESULTS_HEIGHT_KEY,
      getContainer: () => editorPane,
      getSize: () => {
        const rows = getComputedStyle(editorPane).gridTemplateRows.split(" ");
        return parseFloat(rows[2]);
      },
      setSize: (height) => {
        editorPane.style.gridTemplateRows = `minmax(0, 1fr) 4px ${height}px`;
        document.documentElement.style.setProperty("--results-height", `${height}px`);
      },
      min: 120,
      max: (container) => container.getBoundingClientRect().height - 140,
    });

    const PAGE_SIZE = 50;
    let currentQueryId = null;
    let resultOffset = 0;
    let resultTotal = 0;
    let queryEventSource = null;
    let queryRunning = false;
    const expandedNodes = new Set();

    function setRunButtonMode(mode) {
      const btn = document.getElementById("run-btn");
      if (mode === "run") {
        queryRunning = false;
        btn.textContent = "Run";
        btn.disabled = false;
        btn.classList.remove("cancel-btn");
      } else if (mode === "cancel") {
        queryRunning = true;
        btn.textContent = "Cancel";
        btn.disabled = false;
        btn.classList.add("cancel-btn");
      } else {
        btn.disabled = true;
      }
    }

    function fmtPct(value) {
      if (value == null) return "—";
      return `${Math.round(value)}%`;
    }

    function fmtMemory(used, total) {
      if (used == null) return `${total} MB`;
      return `${used} / ${total} MB`;
    }

    function shortId(id) {
      return id ? id.slice(0, 8) : "—";
    }

    function nodeKey(parts) {
      return parts.join(".");
    }

    async function api(path, options) {
      const response = await fetch(path, options);
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || response.statusText);
      }
      if (response.status === 204) return null;
      return response.json();
    }

    async function refreshWorkers() {
      const workers = await api("/workers");
      const table = document.getElementById("workers-table");
      const empty = document.getElementById("workers-empty");
      const body = document.getElementById("workers-body");
      body.innerHTML = "";

      if (!workers.length) {
        table.hidden = true;
        empty.hidden = false;
        return;
      }

      empty.hidden = true;
      table.hidden = false;
      for (const worker of workers) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td title="${worker.endpoint}">${shortId(worker.worker_id)}</td>
          <td>${worker.running_queries} / ${worker.max_concurrent_queries}</td>
          <td>${fmtMemory(worker.memory_used_mb, worker.memory)}</td>
          <td>${fmtPct(worker.cpu_usage)}</td>
          <td>${worker.status}</td>
        `;
        body.appendChild(row);
      }
    }

    function createTreeNode(label, key, children, options = {}) {
      const li = document.createElement("li");
      const hasChildren = children.length > 0;
      const isOpen = expandedNodes.has(key);
      const row = document.createElement("div");
      row.className = "tree-item" + (options.leaf ? " leaf" : "");
      row.innerHTML = `
        <span class="chevron ${hasChildren ? "" : "empty"}">${hasChildren ? (isOpen ? "▼" : "▶") : ""}</span>
        <span class="label">${label}</span>
        ${options.type ? `<span class="type">${options.type}</span>` : ""}
      `;

      const childList = document.createElement("ul");
      childList.hidden = !isOpen;
      for (const child of children) {
        childList.appendChild(child);
      }

      if (hasChildren) {
        row.addEventListener("click", (event) => {
          event.stopPropagation();
          if (expandedNodes.has(key)) {
            expandedNodes.delete(key);
          } else {
            expandedNodes.add(key);
          }
          refreshCatalogTree();
        });
      }

      if (options.onActivate) {
        row.addEventListener("dblclick", (event) => {
          event.stopPropagation();
          options.onActivate();
        });
      }

      li.appendChild(row);
      if (hasChildren) li.appendChild(childList);
      return li;
    }

    function renderCatalog(catalog) {
      const tree = document.getElementById("catalog-tree");
      const empty = document.getElementById("catalog-empty");
      tree.innerHTML = "";

      if (!catalog.databases.length) {
        tree.hidden = true;
        empty.hidden = false;
        empty.textContent = "No databases found.";
        return;
      }

      empty.hidden = true;
      tree.hidden = false;

      for (const database of catalog.databases) {
        const dbKey = nodeKey([database.name]);
        const schemaNodes = database.schemas.map((schema) => {
          const schemaKey = nodeKey([database.name, schema.name]);
          const tableNodes = schema.tables.map((table) => {
            const tableKey = nodeKey([database.name, schema.name, table.name]);
            const qualified = `${database.name}.${schema.name}.${table.name}`;
            const columnNodes = table.columns.map((column) =>
              createTreeNode(column.name, nodeKey([qualified, column.name]), [], {
                leaf: true,
                type: column.type,
              })
            );
            return createTreeNode(table.name, tableKey, columnNodes, {
              onActivate: () => insertText(qualified),
            });
          });
          return createTreeNode(schema.name, schemaKey, tableNodes);
        });
        tree.appendChild(createTreeNode(database.name, dbKey, schemaNodes));
      }
    }

    let catalogTree = null;

    function refreshCatalogTree() {
      if (catalogTree) renderCatalog(catalogTree);
    }

    async function refreshCatalog() {
      try {
        catalogTree = await api("/catalog");
        renderCatalog(catalogTree);
      } catch {
        catalogTree = null;
        document.getElementById("catalog-tree").hidden = true;
        const empty = document.getElementById("catalog-empty");
        empty.hidden = false;
        empty.textContent = "No catalog available.";
      }
    }

    function insertText(text) {
      const editor = document.getElementById("query-input");
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const before = editor.value.slice(0, start);
      const after = editor.value.slice(end);
      editor.value = `${before}${text}${after}`;
      const cursor = start + text.length;
      editor.selectionStart = cursor;
      editor.selectionEnd = cursor;
      editor.focus();
    }

    function setQueryStatus(text, statusClass) {
      const el = document.getElementById("query-status");
      el.textContent = text;
      el.className = "status" + (statusClass ? ` ${statusClass}` : "");
    }

    function hideResultTable() {
      document.getElementById("result-table").hidden = true;
      document.getElementById("result-empty").hidden = false;
      document.getElementById("pager").hidden = true;
    }

    function stopQueryEvents() {
      if (queryEventSource) {
        queryEventSource.close();
        queryEventSource = null;
      }
    }

    async function finishQuery(query) {
      setRunButtonMode("run");
      if (query.status === "completed" && query.result_row_count != null) {
        resultOffset = 0;
        resultTotal = query.result_row_count;
        await loadResultPage();
      } else if (query.error) {
        document.getElementById("result-meta").textContent = query.error;
        hideResultTable();
        document.getElementById("result-empty").textContent = query.error;
      } else {
        document.getElementById("result-meta").textContent = "Query finished without result rows.";
        hideResultTable();
        document.getElementById("result-empty").textContent = "Query finished without result rows.";
      }
    }

    async function handleQueryEvent(query) {
      setQueryStatus(query.status, query.status);
      if (query.status === "pending" || query.status === "running") {
        setRunButtonMode("cancel");
        return;
      }
      stopQueryEvents();
      await finishQuery(query);
    }

    function watchQuery(queryId) {
      stopQueryEvents();
      const source = new EventSource(`/queries/${queryId}/events`);
      queryEventSource = source;

      source.addEventListener("status", (event) => {
        handleQueryEvent(JSON.parse(event.data)).catch((err) => {
          setRunButtonMode("run");
          setQueryStatus(err.message || "Failed to handle query update", "failed");
        });
      });

      source.onerror = async () => {
        stopQueryEvents();
        if (!queryRunning) return;
        try {
          await handleQueryEvent(await api(`/queries/${queryId}`));
        } catch (err) {
          setRunButtonMode("run");
          setQueryStatus(err.message || "Lost query event stream", "failed");
        }
      };
    }

    async function loadResultPage() {
      if (!currentQueryId) return;
      const page = await api(
        `/queries/${currentQueryId}/result?offset=${resultOffset}&limit=${PAGE_SIZE}`
      );
      resultTotal = page.total_rows;

      const head = document.getElementById("result-head");
      const body = document.getElementById("result-body");
      head.innerHTML = `<tr>${page.columns.map((c) => `<th>${c}</th>`).join("")}</tr>`;
      body.innerHTML = page.rows
        .map((row) => `<tr>${row.map((cell) => `<td>${cell ?? ""}</td>`).join("")}</tr>`)
        .join("");

      document.getElementById("result-table").hidden = false;
      document.getElementById("result-empty").hidden = true;
      document.getElementById("result-meta").textContent = `${resultTotal} row(s)`;

      const pager = document.getElementById("pager");
      pager.hidden = resultTotal <= PAGE_SIZE;
      document.getElementById("page-info").textContent =
        `${resultOffset + 1}-${Math.min(resultOffset + PAGE_SIZE, resultTotal)} of ${resultTotal}`;
      document.getElementById("prev-page").disabled = resultOffset === 0;
      document.getElementById("next-page").disabled = resultOffset + PAGE_SIZE >= resultTotal;
    }

    async function runQuery() {
      const sql = document.getElementById("query-input").value.trim();
      if (!sql) return;

      stopQueryEvents();
      currentQueryId = null;
      hideResultTable();
      document.getElementById("result-empty").textContent = "Running query...";
      document.getElementById("result-meta").textContent = "";
      setRunButtonMode("disabled");
      setQueryStatus("submitting");

      const created = await api("/queries", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: sql }),
      });

      currentQueryId = created.query_id;
      setQueryStatus(created.status, created.status);
      setRunButtonMode("cancel");
      watchQuery(currentQueryId);
    }

    async function cancelQuery() {
      if (!currentQueryId) return;
      setRunButtonMode("disabled");
      setQueryStatus("cancelling", "running");
      await api(`/queries/${currentQueryId}/cancel`, { method: "POST" });
    }

    document.getElementById("run-btn").addEventListener("click", () => {
      const action = queryRunning ? cancelQuery() : runQuery();
      action.catch((err) => {
        setRunButtonMode("run");
        setQueryStatus(err.message || "Request failed", "failed");
      });
    });

    document.getElementById("query-input").addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        event.preventDefault();
        document.getElementById("run-btn").click();
      }
    });

    document.getElementById("prev-page").addEventListener("click", () => {
      resultOffset = Math.max(0, resultOffset - PAGE_SIZE);
      loadResultPage().catch((err) => setQueryStatus(err.message, "failed"));
    });

    document.getElementById("next-page").addEventListener("click", () => {
      resultOffset += PAGE_SIZE;
      loadResultPage().catch((err) => setQueryStatus(err.message, "failed"));
    });

    setInterval(() => {
      document.getElementById("clock").textContent = new Date().toLocaleTimeString();
      refreshWorkers().catch(() => {});
    }, 2000);

    refreshWorkers().catch(() => {});
    refreshCatalog().catch(() => {});
    setInterval(() => refreshCatalog().catch(() => {}), 10000);
  </script>
